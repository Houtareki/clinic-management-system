<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Health Couch | Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <link rel="stylesheet" href="assets/css/login.css" />
  </head>
  <body>
    <section>
      <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container-fluid container">
          <a class="navbar-brand text-success fs-3" href="./index.html"
            >Health Couch</a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-4 fw-medium">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="./index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item"><a class="nav-link" href="#">About</a></li>
              <li class="nav-item">
                <a class="nav-link" href="#">Services</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Blog
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Blog</a></li>
                  <li><a class="dropdown-item" href="#">Blog details</a></li>
                </ul>
              </li>
              <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </section>

    <main class="login-wrapper w-100">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="card login-card">
              <div class="card-header">
                <i class="fa-solid fa-user-doctor me-2"></i> Welcome Back
              </div>
              <div class="card-body p-4 p-md-5">
                <form action="" method="">
                  <div class="form-group row mb-4">
                    <label
                      for="email_address"
                      class="col-md-4 col-form-label text-md-end fw-bold"
                      >E-Mail Address</label
                    >
                    <div class="col-md-8">
                      <input
                        type="text"
                        id="email_address"
                        class="form-control form-control-lg fs-6"
                        name="email-address"
                        required
                        autofocus
                        placeholder="Enter your email"
                      />
                    </div>
                  </div>

                  <div class="form-group row mb-4">
                    <label
                      for="password"
                      class="col-md-4 col-form-label text-md-end fw-bold"
                      >Password</label
                    >
                    <div class="col-md-8">
                      <input
                        type="password"
                        id="password"
                        class="form-control form-control-lg fs-6"
                        name="password"
                        required
                        placeholder="Enter your password"
                      />
                    </div>
                  </div>

                  <div class="form-group row mb-4">
                    <div class="col-md-8 offset-md-4">
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          name="remember"
                          id="rememberMe"
                        />
                        <label
                          class="form-check-label text-muted"
                          for="rememberMe"
                        >
                          Remember Me
                        </label>
                      </div>
                    </div>
                  </div>

                  <div class="form-group row">
                    <div class="col-md-8 offset-md-4 d-flex align-items-center">
                      <button type="submit" class="btn btn-login shadow-sm">
                        Login
                      </button>
                      <a href="#" class="login-link"> Forgot Your Password? </a>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
