<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trustcare | Hồ sơ cá nhân</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <link rel="stylesheet" href="../../assets/css/admin.css" />
  </head>
  <body>
    <section>
      <input type="checkbox" id="sidebar-toggle" hidden />
      <aside class="sidebar shadow-sm">
        <div class="brand">
          <i class="fa-solid fa-hospital-user text-success me-2 fs-4"></i>
          Trustcare Clinic
        </div>
        <ul class="sidebar-menu">
          <li class="menu-title">Tổng quan</li>
          <li class="active">
            <a href="admin.html"><i class="fa-solid fa-house"></i> Dashboard</a>
          </li>

          <li>
            <a href="doctors.html"
              ><i class="fa-solid fa-user-doctor"></i> Hồ sơ Bác sĩ</a
            >
          </li>
          <li>
            <a href="patients.html"
              ><i class="fa-solid fa-user-doctor"></i> Danh sách bệnh nhân</a
            >
          </li>
        </ul>
      </aside>
    </section>

    <main class="main-wrapper">
      <header class="top-header shadow-sm">
        <div class="dropdown ms-auto">
          <div
            class="d-flex align-items-center gap-3 dropdown-toggle dropdown-toggle-no-caret"
            data-bs-toggle="dropdown"
            style="cursor: pointer"
          >
            <div class="text-end d-none d-md-block">
              <div class="fw-bold fs-6">Admin Tuấn</div>
              <div class="text-muted" style="font-size: 0.75rem">
                System Administrator
              </div>
            </div>
            <img
              src="https://ui-avatars.com/api/?name=Tuan&background=0d6efd&color=fff"
              class="rounded-circle shadow-sm"
              width="40"
              height="40"
            />
          </div>

          <ul
            class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-3"
            style="min-width: 200px"
          >
            <li>
              <a
                class="dropdown-item py-2 active bg-light text-primary fw-bold"
                href="admin-profile.html"
                ><i class="fa-regular fa-user me-2"></i> Hồ sơ cá nhân</a
              >
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <a
                class="dropdown-item py-2 text-danger fw-bold mb-1"
                href="../../login.html"
                ><i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Đăng
                xuất</a
              >
            </li>
          </ul>
        </div>
      </header>

      <!-- -------------------------profile-------------------- -->
      <div class="container-fluid p-4">
        <h3 class="fw-bold mb-4">Thiết lập Tài khoản</h3>

        <div class="row g-4">
          <div class="col-lg-4">
            <div class="detail-card p-4 text-center h-100">
              <div class="mb-4 position-relative d-inline-block">
                <img
                  src="https://ui-avatars.com/api/?name=Tuan&background=0d6efd&color=fff&size=200"
                  alt="Profile"
                  class="profile-avatar-large"
                />
              </div>

              <h4 class="fw-bold text-dark mb-1">Admin Tuấn</h4>
              <p class="text-muted mb-4">System Administrator</p>

              <div class="upload-btn-wrapper w-100 mb-3">
                <button class="btn btn-light border fw-medium w-100">
                  <i class="fa-solid fa-camera me-2"></i> Đổi ảnh đại diện
                </button>
                <input type="file" name="myfile" accept="image/*" />
              </div>
              <p class="text-muted fs-7 mb-0">
                Cho phép định JPG, GIF hoặc PNG. Kích thước tối đa 2MB.
              </p>
            </div>
          </div>

          <div class="col-lg-8">
            <div class="detail-card p-4 p-md-5">
              <form action="#">
                <div class="form-section-title">
                  <i class="fa-regular fa-address-card me-2"></i> Thông tin cơ
                  bản
                </div>
                <div class="row g-4 mb-5">
                  <div class="col-md-6">
                    <label class="form-label fw-medium text-muted"
                      >Họ và Tên</label
                    >
                    <input
                      type="text"
                      class="form-control bg-light"
                      value="Phạm Tuấn"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium text-muted"
                      >Tên đăng nhập (Username)</label
                    >
                    <input
                      type="text"
                      class="form-control bg-light"
                      value="admin"
                      readonly
                      disabled
                      title="Không thể đổi tên đăng nhập"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium text-muted"
                      >Số điện thoại</label
                    >
                    <input
                      type="text"
                      class="form-control bg-light"
                      value="0987654321"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium text-muted"
                      >Email liên hệ</label
                    >
                    <input
                      type="email"
                      class="form-control bg-light"
                      value="pham.tuan@trustcare.com"
                    />
                  </div>
                </div>

                <!-- -----------------------change pass---------------------- -->
                <div class="form-section-title">
                  <i class="fa-solid fa-shield-halved me-2"></i> Bảo mật tài
                  khoản
                </div>
                <div class="row g-4 mb-4">
                  <div class="col-12">
                    <label class="form-label fw-medium text-muted"
                      >Mật khẩu hiện tại</label
                    >
                    <input
                      type="password"
                      class="form-control bg-light"
                      placeholder="••••••••"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium text-muted"
                      >Mật khẩu mới</label
                    >
                    <input
                      type="password"
                      class="form-control bg-light"
                      placeholder="Nhập mật khẩu mới"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium text-muted"
                      >Xác nhận mật khẩu mới</label
                    >
                    <input
                      type="password"
                      class="form-control bg-light"
                      placeholder="Nhập lại mật khẩu mới"
                    />
                  </div>
                </div>

                <!-- NÚT LƯU -->
                <hr class="text-muted opacity-25 mt-5 mb-4" />
                <div class="d-flex justify-content-end gap-3">
                  <button
                    type="button"
                    class="btn btn-light border px-4 fw-medium"
                  >
                    Hủy bỏ
                  </button>
                  <button
                    type="button"
                    class="btn btn-primary-custom px-5 fw-bold shadow-sm"
                    style="border-radius: 8px"
                    onclick="alert('Cập nhật hồ sơ thành công!')"
                  >
                    Lưu cập nhật
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
